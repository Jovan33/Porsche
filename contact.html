<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="author" content="Jovan">
        <meta name="description" content="Site about Porsche Penske Racing team, learn about the drivers, cars and more">
        <meta name="keywords" content="Porsche Penske Motorsport, Porsche, Penske, Motorsport, Hypercar, WEC, LMGT3, Race , le Mans, Michelin">
        <link rel="icon" type="img/png" href="img/porsche-icon.ico">
        <title>Contact | Porsche Penske Motorsport</title>
        <link href="https://db.onlinewebfonts.com/c/2ad24930d996d33544708f0637f7690a?family=Porsche+Next" rel="stylesheet">
        <script src="https://kit.fontawesome.com/64ebd4cef7.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="css/style.css"/>

    </head>
        <body>
            
            <header class="d-flex justify-content-between align-items-center shade">

                <div class="hleft d-flex justify-content aling-items-center">
                    <a href="index.html"><img src="img/team-logo.png" alt="Porsche-logo"></a>
                </div>

                <div id="middletext" class="container">
                            Porsche Penske Motorsport
                </div>

                <div class="hright d-flex aling-items-center">

                    <div class="navbar navbar-expand-md">
                        <ul class="navbar-nav d-flex gap-2">
                        </ul>
                        <div class="hamburger">
                                <span class="bar"></span>
                                <span class="bar"></span>
                                <span class="bar"></span>
                        </div>
                    </div>

                </div>

            </header>
            <div class="divider bmenu"></div>
            
            <div class="container mtopbot">
                <h2 class="form-head">Contact Information</h2>
                <form action="#" method="GET" id="contact-form" class="col-12 col-md-8 col-lg-6">
                    <div class="row">
                       
                        <div class="form-group col-12 col-md-6 mb-3">
                            <input type="text" id="name" name="name" placeholder="Name *" maxlength="20" autocomplete="off">
                            <span class="error" id="nameError"></span>
                        </div>
                        
                        <div class="form-group col-12 col-md-6 mb-3">
                            <input type="text" id="surname" name="surname" placeholder="Surname *" maxlength="20" autocomplete="off">
                            <span class="error" id="surnameError"></span>
                        </div>

                    </div>
                    <div class="form-group mb-3">
                        <input type="text" id="e-mail" name="email" placeholder="E-mail *" maxlength="30" autocomplete="off">
                        <span class="error" id="emailError"></span>
                    </div>
                    <div class="mb-3">
                        <label for="table-teams" class="mb-2" id="favourite-team">Choose your favourite team: *</label>
                        <select name="table-teams" id="table-teams">
                            <option value disabled selected>Choose a team:</option>
                            <option value="Porsche">Porsche</option>
                            <option value="Alpine">Alpine</option>
                            <option value="Aston Martin">Aston Martin</option>
                            <option value="BMW">BMW</option>
                            <option value="Cadillac">Cadillac</option>
                            <option value="Corvette">Corvette</option>
                            <option value="Ferrari">Ferrari</option>
                            <option value="Ford">Ford</option>
                            <option value="lexus">Lexus</option>
                            <option value="Mclaren">Mclaren</option>
                            <option value="Mercedes">Mercedes</option>
                            <option value="Peugeot">Peugeot</option>
                            <option value="Toyota">Toyota</option>
                        </select>
                        <span class="error" id="selectError"></span>
                    </div>
                    <div class="mb-3 form-group">
                        <label class="mb-3">Do you watch WEC? *</label>
                          <div class="d-flex flex-column gap-3 radio-group">
                            <label><input type="radio" name="wec" id="yes" value="yes"> Yes</label>
                            <label><input type="radio" name="wec" id="sometimes" value="sometimes"> Sometimes</label>
                            <label><input type="radio" name="wec" id="no" value="no"> No</label>
                          </div> 
                          <span class="error" id="radioError"></span>
                    </div>
                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea name="message" id="message" rows="5" placeholder="Write us a message (WEC, Porsche, Racing...)"></textarea>
                        <span class="error" id="messageError"></span>
                    </div>
                    <button type="submit" class="submit-message mt-3">Submit Message</button>
                </form>
            </div>

            <div class="divider"></div>


            <footer class="py-5 container mt-5">
            </footer>

            <script src="/js/bootstrap.bundle.min.js"></script>
            <script src="/js/main.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        </body>
</html>
